name: Case Study CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 botocore

      - name: Test Case Study 1
        run: |
          python case-study-1/automation/netapp_cutover_precheck.py --mock --output test.csv

      - name: Test Case Study 2
        run: |
          python -m py_compile case-study-2/src/main.py