name: Case Study 2 CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  case-study-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 botocore pytest

      - name: Syntax check
        run: |
          python -m py_compile case-study-2/src/main.py

      - name: Run Case Study 2 in DRY_RUN mode
        env:
          DRY_RUN: "true"
          TIMEZONE: "US/Eastern"
          SIZE_THRESHOLD_BYTES: "1"
          AWS_DEFAULT_REGION: "us-east-1"
        run: |
          python case-study-2/src/main.py
