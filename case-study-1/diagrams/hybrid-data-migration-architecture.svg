<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="55%" stop-color="#eef4ff"/><stop offset="100%" stop-color="#f5f3ff"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
    <linearGradient id="premPanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="awsPanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5f3ff"/><stop offset="100%" stop-color="#e0e7ff"/></linearGradient>
    <linearGradient id="costPanel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f7fee7"/><stop offset="100%" stop-color="#dcfce7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/></filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/></marker>
  </defs>
  <style>
    .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #ffffff; }
    .subtitle { font: 500 15px Arial, Helvetica, sans-serif; fill: #dbeafe; }
    .sectionTag { font: 700 15px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 1px; }
    .sectionTitle { font: 700 22px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .b { font: 700 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .t { font: 500 14px Arial, Helvetica, sans-serif; fill: #1f2937; }
    .small { font: 600 12px Arial, Helvetica, sans-serif; fill: #334155; }
    .foot { font: 600 15px Arial, Helvetica, sans-serif; fill: #0f172a; }
    .pillText { font: 700 13px Arial, Helvetica, sans-serif; fill: #ffffff; }
    .panel { stroke: #cbd5e1; stroke-width: 1.5; rx: 28; ry: 28; }
    .card { stroke: #cbd5e1; stroke-width: 1.4; rx: 20; ry: 20; fill: #ffffff; }
    .arrowBlue { stroke: #2563eb; stroke-width: 5; fill: none; marker-end: url(#arrowBlue); }
    .arrowPurple { stroke: #7c3aed; stroke-width: 4; fill: none; stroke-dasharray: 10 10; marker-end: url(#arrowPurple); }
    .arrowGreen { stroke: #16a34a; stroke-width: 4.5; fill: none; marker-end: url(#arrowGreen); }
  </style>
  <rect width="1600" height="950" fill="url(#bg)"/>
  <circle cx="1430" cy="120" r="220" fill="#dbeafe" opacity="0.35"/>
  <circle cx="1230" cy="820" r="240" fill="#ddd6fe" opacity="0.28"/>
  <circle cx="210" cy="790" r="180" fill="#bfdbfe" opacity="0.18"/>
  <rect x="40" y="28" width="1520" height="98" rx="24" fill="url(#header)" filter="url(#shadow)"/>
  <text x="68" y="68" class="title">400TB Hybrid Data Migration Architecture — Mohammed Tahir Khan</text>
  <text x="68" y="96" class="subtitle">Primary cutover engine: SnapMirror  •  FinOps lane: cold-data archive to Amazon S3 Glacier Flexible Retrieval</text>
  <rect x="55" y="150" width="420" height="670" class="panel" fill="url(#premPanel)" filter="url(#shadow)"/>
  <text x="82" y="188" class="sectionTag">SOURCE ENVIRONMENT</text><text x="82" y="218" class="sectionTitle">On-Premises Data Center</text>
  <rect x="82" y="245" width="366" height="112" class="card" filter="url(#softShadow)"/>
  <text x="104" y="282" class="b">NetApp AFF Cluster</text><text x="104" y="310" class="t">• 300+ volumes / 400 TB unstructured data</text><text x="104" y="334" class="t">• NFS and SMB engineering workloads</text>
  <rect x="82" y="382" width="366" height="112" class="card" filter="url(#softShadow)"/>
  <text x="104" y="419" class="b">Low-Impact Metadata Scan Host</text><text x="104" y="447" class="t">• Reads metadata only to protect controller performance</text><text x="104" y="471" class="t">• Produces hot / warm / cold classification report</text>
  <rect x="82" y="519" width="366" height="112" class="card" filter="url(#softShadow)"/>
  <text x="104" y="556" class="b">Cutover Control Plane</text><text x="104" y="584" class="t">• SnapMirror readiness and lag validation</text><text x="104" y="608" class="t">• Go / No-Go orchestration inside 4-hour window</text>
  <rect x="82" y="656" width="366" height="112" class="card" filter="url(#softShadow)"/>
  <text x="104" y="693" class="b">Business Owners / Data Stewards</text><text x="104" y="721" class="t">• Approve archive candidates and exception paths</text><text x="104" y="745" class="t">• Validate access after final cutover</text>
  <rect x="590" y="150" width="445" height="670" class="panel" fill="url(#awsPanel)" filter="url(#shadow)"/>
  <text x="617" y="188" class="sectionTag">TARGET PLATFORM</text><text x="617" y="218" class="sectionTitle">AWS Landing Zone</text>
  <rect x="617" y="245" width="391" height="138" class="card" filter="url(#softShadow)"/>
  <text x="639" y="282" class="b">Amazon FSx for NetApp ONTAP</text><text x="639" y="310" class="t">• Hot data (&lt; 1 year) retained on SSD tier</text><text x="639" y="334" class="t">• Warm data (1–3 years) moved to ONTAP capacity pool</text><text x="639" y="358" class="t">• Deterministic near-zero downtime final cutover</text>
  <rect x="617" y="414" width="391" height="120" class="card" filter="url(#softShadow)"/>
  <text x="639" y="451" class="b">EC2 Validation / Client Test Zone</text><text x="639" y="479" class="t">• NFS/SMB smoke tests and mount validation</text><text x="639" y="503" class="t">• Application verification after mirror break</text>
  <rect x="617" y="565" width="391" height="120" class="card" filter="url(#softShadow)"/>
  <text x="639" y="602" class="b">Monitoring and Logs</text><text x="639" y="630" class="t">• Cutover dashboard, lag, failures, and remediation</text><text x="639" y="654" class="t">• Operational evidence for go-live decision</text>
  <rect x="1150" y="150" width="395" height="670" class="panel" fill="url(#costPanel)" filter="url(#shadow)"/>
  <text x="1177" y="188" class="sectionTag">FINOPS LANE</text><text x="1177" y="218" class="sectionTitle">Archive &amp; Cost Optimization</text>
  <rect x="1177" y="245" width="341" height="130" class="card" filter="url(#softShadow)"/>
  <text x="1199" y="282" class="b">Amazon S3 Archive Landing</text><text x="1199" y="310" class="t">• Cold files older than 3 years</text><text x="1199" y="334" class="t">• Retains searchable object inventory and restore path</text><text x="1199" y="358" class="t">• Prevents premium NAS spend on dormant data</text>
  <rect x="1177" y="408" width="341" height="130" class="card" filter="url(#softShadow)"/>
  <text x="1199" y="445" class="b">S3 Glacier Flexible Retrieval</text><text x="1199" y="473" class="t">• Lifecycle target for long-term cold retention</text><text x="1199" y="497" class="t">• Optimized for very infrequent restores</text><text x="1199" y="521" class="t">• Lower-cost archive tier for FinOps compliance</text>
  <rect x="1177" y="571" width="341" height="112" class="card" filter="url(#softShadow)"/>
  <text x="1199" y="608" class="b">FinOps Reporting</text><text x="1199" y="636" class="t">• Cold data percentage by volume</text><text x="1199" y="660" class="t">• Avoided SSD and FSx storage spend</text>
  <path d="M448 300 C520 300, 540 300, 617 300" class="arrowBlue"/><text x="468" y="282" class="small">SnapMirror baseline + incremental replication</text>
  <path d="M448 438 C540 438, 620 310, 1177 310" class="arrowPurple"/><text x="490" y="418" class="small">Metadata classification drives cold-data archive decisions</text>
  <path d="M813 383 C813 395, 813 404, 813 414" class="arrowBlue"/><text x="835" y="404" class="small">Cutover validation</text>
  <path d="M813 534 C813 545, 813 554, 813 565" class="arrowBlue"/><text x="835" y="554" class="small">Operational telemetry</text>
  <path d="M448 575 C520 575, 548 625, 617 625" class="arrowGreen"/><text x="468" y="555" class="small">Pre-check status and decision support</text>
  <path d="M1348 375 C1348 388, 1348 396, 1348 408" class="arrowGreen"/><text x="1372" y="396" class="small">Lifecycle transition</text>
  <rect x="63" y="840" width="1482" height="78" rx="22" fill="#ffffff" stroke="#dbe3f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="85" y="858" width="132" height="40" rx="20" fill="#0f172a"/><text x="113" y="884" class="pillText">ARCHITECTURE</text>
  <text x="240" y="884" class="foot">Use SnapMirror for deterministic 4-hour cutover, while redirecting dormant cold data to S3/Glacier so AWS premium storage is reserved only for active engineering data.</text>
</svg>